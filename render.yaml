services:
  - type: web
    name: bank-of-bihar-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/auth/session
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bank-of-bihar-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"

databases:
  - name: bank-of-bihar-db
    databaseName: bank_of_bihar
    plan: free
